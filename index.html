<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RealiveNES - Play NES Games in Browser</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 1.2rem 1rem;
      background: linear-gradient(135deg, #16213e, #0f3460);
      border-bottom: 3px solid #e94560;
    }

    header h1 {
      font-size: 2rem;
      color: #e94560;
      text-shadow: 0 0 10px rgba(233,69,96,0.5);
    }

    header p {
      font-size: 0.85rem;
      color: #a0a0b0;
      margin-top: 0.25rem;
    }

    .layout {
      display: flex;
      height: calc(100vh - 80px);
    }

    /* Sidebar */
    .sidebar {
      width: 340px;
      min-width: 340px;
      background: #16213e;
      border-right: 2px solid #0f3460;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-controls {
      padding: 0.75rem;
      border-bottom: 1px solid #0f3460;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .search-row {
      display: flex;
      gap: 0.4rem;
    }

    .search-row input {
      flex: 1;
      padding: 0.55rem 0.7rem;
      border: 2px solid #0f3460;
      border-radius: 6px;
      background: #1a1a2e;
      color: #e0e0e0;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-row input:focus { border-color: #e94560; }

    .search-row button {
      padding: 0.55rem 0.9rem;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .search-row button:hover { background: #d63851; }

    .filter-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .filter-row select {
      flex: 1;
      padding: 0.45rem 0.6rem;
      border: 2px solid #0f3460;
      border-radius: 6px;
      background: #1a1a2e;
      color: #e0e0e0;
      font-size: 0.8rem;
      outline: none;
    }

    .filter-row select:focus { border-color: #e94560; }

    .game-count {
      font-size: 0.75rem;
      color: #7a7a8a;
      white-space: nowrap;
    }

    /* Game list */
    .game-list-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 0.4rem;
    }

    .game-list-wrap::-webkit-scrollbar { width: 5px; }
    .game-list-wrap::-webkit-scrollbar-track { background: #1a1a2e; }
    .game-list-wrap::-webkit-scrollbar-thumb { background: #e94560; border-radius: 3px; }

    .game-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.6rem 0.7rem;
      border-radius: 7px;
      cursor: pointer;
      border: 1px solid transparent;
      margin-bottom: 0.2rem;
      transition: background 0.15s, border-color 0.15s;
    }

    .game-item:hover {
      background: #1a1a2e;
      border-color: #e94560;
    }

    .game-item.active {
      background: #0f3460;
      border-color: #e94560;
    }

    .game-info { flex: 1; min-width: 0; }

    .game-title {
      font-size: 0.82rem;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .game-meta {
      font-size: 0.7rem;
      color: #7a7a8a;
      margin-top: 0.1rem;
    }

    .play-btn {
      padding: 0.3rem 0.7rem;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 0.72rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s, transform 0.1s;
    }

    .play-btn:hover { background: #d63851; transform: scale(1.05); }
    .play-btn:disabled { background: #555; cursor: not-allowed; transform: none; }

    .no-results {
      text-align: center;
      padding: 2rem 1rem;
      color: #7a7a8a;
      font-style: italic;
    }

    /* Emulator panel */
    .emulator-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      overflow: hidden;
    }

    .now-playing {
      display: none;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.75rem;
      padding: 0.6rem 1rem;
      background: #16213e;
      border: 1px solid #e94560;
      border-radius: 8px;
      width: 100%;
      max-width: 740px;
    }

    .now-playing.active { display: flex; }

    .np-label {
      font-size: 0.7rem;
      color: #e94560;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .np-title {
      flex: 1;
      font-weight: 600;
      color: #fff;
      font-size: 0.9rem;
    }

    .stop-btn {
      padding: 0.35rem 0.9rem;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 0.78rem;
      cursor: pointer;
    }

    .stop-btn:hover { background: #d63851; }

    #emulator-wrapper {
      width: 100%;
      max-width: 740px;
      aspect-ratio: 4 / 3;
      display: none;
    }

    #emulator-wrapper.active { display: block; }

    #game { width: 100%; height: 100%; }

    .placeholder {
      text-align: center;
      color: #5a5a6a;
      max-width: 500px;
    }

    .placeholder h2 {
      font-size: 1.4rem;
      color: #e94560;
      margin-bottom: 0.6rem;
    }

    .placeholder p {
      font-size: 0.9rem;
      line-height: 1.5;
      margin-bottom: 1.2rem;
    }

    .controls-box {
      padding: 1rem;
      background: #16213e;
      border-radius: 8px;
      border: 1px solid #0f3460;
      text-align: left;
    }

    .controls-box h3 {
      color: #e94560;
      font-size: 0.85rem;
      margin-bottom: 0.5rem;
    }

    .controls-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.25rem 1rem;
      font-size: 0.8rem;
    }

    .controls-grid .key { color: #7a7a8a; }
    .controls-grid code {
      color: #e0e0e0;
      background: #0f3460;
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      font-size: 0.75rem;
    }

    /* Responsive */
    @media (max-width: 860px) {
      .layout { flex-direction: column; height: auto; min-height: calc(100vh - 80px); }
      .sidebar {
        width: 100%; min-width: 100%;
        max-height: 40vh;
        border-right: none;
        border-bottom: 2px solid #0f3460;
      }
      #emulator-wrapper { max-width: 100%; }
    }
  </style>
</head>
<body>
  <header>
    <h1>RealiveNES</h1>
    <p>Pick a game. Click Play. No downloads needed.</p>
  </header>

  <div class="layout">
    <!-- Game List -->
    <aside class="sidebar">
      <div class="sidebar-controls">
        <div class="search-row">
          <input type="text" id="searchInput" placeholder="Search games..." />
          <button id="searchBtn">Search</button>
        </div>
        <div class="filter-row">
          <select id="genreFilter"></select>
          <span class="game-count" id="gameCount">0 games</span>
        </div>
      </div>
      <div class="game-list-wrap">
        <div id="gameList"></div>
      </div>
    </aside>

    <!-- Emulator -->
    <main class="emulator-panel">
      <div class="now-playing" id="nowPlaying">
        <div>
          <div class="np-label">Now Playing</div>
          <div class="np-title" id="nowPlayingTitle">-</div>
        </div>
        <button class="stop-btn" id="stopBtn">Stop</button>
      </div>

      <div id="emulator-wrapper">
        <div id="game"></div>
      </div>

      <div class="placeholder" id="emulatorPlaceholder">
        <h2>Select a Game</h2>
        <p>Pick any game from the list and hit Play.<br/>It loads right here in your browser — no ROM downloads.</p>
        <div class="controls-box">
          <h3>Keyboard Controls</h3>
          <div class="controls-grid">
            <span class="key">D-Pad</span><code>Arrow Keys</code>
            <span class="key">A</span><code>X</code>
            <span class="key">B</span><code>Z</code>
            <span class="key">Start</span><code>Enter</code>
            <span class="key">Select</span><code>Shift</code>
            <span class="key">Save State</span><code>F1</code>
            <span class="key">Load State</span><code>F4</code>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/games-db.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
