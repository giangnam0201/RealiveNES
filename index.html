<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RealiveNES - Game Selector</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      text-align: center;
      padding: 2rem 1rem;
      width: 100%;
      background: linear-gradient(135deg, #16213e, #0f3460);
      border-bottom: 3px solid #e94560;
    }

    header h1 {
      font-size: 2.5rem;
      color: #e94560;
      text-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
      margin-bottom: 0.5rem;
    }

    header p {
      font-size: 1rem;
      color: #a0a0b0;
    }

    .container {
      max-width: 900px;
      width: 100%;
      padding: 2rem 1rem;
    }

    .search-bar {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .search-bar input {
      flex: 1;
      padding: 0.75rem 1rem;
      border: 2px solid #0f3460;
      border-radius: 8px;
      background: #16213e;
      color: #e0e0e0;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.3s;
    }

    .search-bar input:focus {
      border-color: #e94560;
    }

    .search-bar button {
      padding: 0.75rem 1.5rem;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s;
    }

    .search-bar button:hover {
      background: #d63851;
    }

    .status {
      text-align: center;
      padding: 1rem;
      color: #a0a0b0;
      font-style: italic;
    }

    .status.error {
      color: #e94560;
    }

    .game-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 1rem;
    }

    .game-card {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 10px;
      padding: 1.25rem;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.3s, box-shadow 0.3s;
    }

    .game-card:hover {
      transform: translateY(-3px);
      border-color: #e94560;
      box-shadow: 0 5px 20px rgba(233, 69, 96, 0.2);
    }

    .game-card h3 {
      font-size: 0.95rem;
      color: #ffffff;
      margin-bottom: 0.5rem;
      word-break: break-word;
    }

    .game-card .meta {
      font-size: 0.8rem;
      color: #7a7a8a;
    }

    .game-card .download-btn {
      display: inline-block;
      margin-top: 0.75rem;
      padding: 0.4rem 1rem;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.3s;
    }

    .game-card .download-btn:hover {
      background: #d63851;
    }

    .game-card .download-btn:disabled {
      background: #555;
      cursor: not-allowed;
    }

    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      margin-top: 2rem;
    }

    .pagination button {
      padding: 0.5rem 1.25rem;
      background: #0f3460;
      color: #e0e0e0;
      border: 1px solid #e94560;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.3s;
    }

    .pagination button:hover:not(:disabled) {
      background: #e94560;
    }

    .pagination button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .pagination span {
      color: #a0a0b0;
    }

    .loader {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #0f3460;
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    footer {
      margin-top: auto;
      padding: 1.5rem;
      text-align: center;
      color: #5a5a6a;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>RealiveNES</h1>
    <p>Browser-Native NES ROM Selector &mdash; Powered by Archive.org</p>
  </header>

  <div class="container">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search NES ROMs..." />
      <button id="searchBtn">Search</button>
    </div>

    <div id="status" class="status">Loading game list...</div>
    <div id="gameList" class="game-list"></div>

    <div class="pagination" id="pagination" style="display:none;">
      <button id="prevBtn">&#8592; Prev</button>
      <span id="pageInfo">Page 1</span>
      <button id="nextBtn">Next &#8594;</button>
    </div>
  </div>

  <footer>
    RealiveNES &copy; 2026 &mdash; ROMs sourced from Archive.org public collections
  </footer>

  <script src="js/jsonp.js"></script>
  <script src="js/archive-api.js"></script>
  <script src="js/rom-fetcher.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
